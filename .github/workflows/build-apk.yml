name: Build APK on Push

on:
  push:
    branches:
      - main  # Trigger when pushing to main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/checkout@v4
        with:
          node-version: 18

      - name: 🏗 Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.TOKEN_EXPO_ANDROID }}

      - name: 📦 Install dependencies
        run: npm install

      - name: 🚀 Build APK
        run: eas build --platform android --profile preview --non-interactive --local --output=./builds/app-release.apk

      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-apk
          path: ./builds/app-build.apk
          retention-days: 15
